[svelte]

; Maximum texture dimension in pixels after stripping.
; Allowed values: 2048, 1024, 512, 256, 128, 64
; Lower = less VRAM = blurrier textures.
; Default: 1024 (good balance for most GPUs)
max_resolution=1024

; Don't strip textures smaller than this (pixels).
; Protects small UI/interface textures.
min_texture_dimension=64

; 1 = on, 0 = off.
; Set to 0 to disable without removing files.
enabled=1

; 0=off, 1=basic, 2=verbose, 3=debug.
; 0 = no log file.
; 1 = StripMips lines + periodic Stats (every 300 frames).
; 2 = also logs every safety-filter skip and exclusion match.
; 3 = logs every texture creation (very verbose).
log_level=0
